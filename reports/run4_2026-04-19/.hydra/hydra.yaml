hydra:
  run:
    dir: /workspace/runs/run4
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
        datefmt: '%H:%M:%S'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] %(message)s'
        datefmt: '%H:%M:%S'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=/workspace/runs/run4
    - hydra.mode=RUN
    task:
    - task=unlearning_atu_fast
    - unlearning_target=1_Stephen_King
    - skip_initial_eval=true
    - task.training_module.pretrained_model_hook_layer=4
    - task.training_module.kl_retain_weight=0.0
    - task.training_module.disable_grad_checkpointing_on_unlearn=true
    - task.subject_mask_window=1
    - task.unlearning_data.batch_size=32
    - task.unlearning_data.max_input_length=128
    - task.unlearning_data.num_workers=8
    - trainer.devices=1
    - +trainer.precision=bf16-mixed
  job:
    name: ${exp}
    chdir: null
    override_dirname: +trainer.precision=bf16-mixed,skip_initial_eval=true,task.subject_mask_window=1,task.training_module.disable_grad_checkpointing_on_unlearn=true,task.training_module.kl_retain_weight=0.0,task.training_module.pretrained_model_hook_layer=4,task.unlearning_data.batch_size=32,task.unlearning_data.max_input_length=128,task.unlearning_data.num_workers=8,task=unlearning_atu_fast,trainer.devices=1,unlearning_target=1_Stephen_King
    id: ???
    num: ???
    config_name: train
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /workspace/informed-align-unlearn
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/informed-align-unlearn/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/runs/run4
    choices:
      experiment: null
      pre_trained_llm: qwen3.5-4b
      hydra: default
      task: unlearning_atu_fast
      data@task.unlearning_data: rwku-positive
      embedding_prediction_model@task.embedding_prediction_model: transformer
      text_encoder@task.text_encoder: all-mpnet-base-v2
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
