defaults:
  - task: unlearning_atu
  - hydra: default
  # Allow the model to overwrite the settings below
  - _self_
  - pre_trained_llm: qwen3.5-4b
  - experiment: ~

unlearning_target: "1_Stephen_King"

# Optional chaining: run multiple (target, layer) unlearning steps sequentially,
# passing the modified model from each step into the next. When set, this takes
# precedence over unlearning_target.
# Example:
#   unlearning_chain:
#     - target: "1_Stephen_King"
#       layer: 4
#     - target: "2_Confucius"
#       layer: 20
unlearning_chain: ~

skip_initial_eval: false

seed: ~

name: unlearning-${unlearning_target}
exp: atu-unlearning

wandb:
  id: ~
  entity: ~
  project: informed-align-unlearn
  group: ~
  name: atu-layer${task.training_module.pretrained_model_hook_layer}-${unlearning_target}-${pre_trained_llm.name}
  mode: ~

hydra:
  job:
    name: ${exp}

trainer:
  accelerator: auto
  devices: auto
  max_epochs: -1
  log_every_n_steps: 10

early_stopping: ~

matmul_precision: medium

